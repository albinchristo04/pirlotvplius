name: Build & Deploy
on:
  push:
    branches: [main]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch match data
        run: node src/data/fetch.js
        env:
          JSON_SOURCE: ${{ secrets.JSON_SOURCE }}

      - name: Build site
        run: npm run build
        env:
          SITE_URL: https://www.velcuri.io

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=velcuri-io
